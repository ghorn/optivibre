name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    runs-on: macos-14
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      LLVM_SYS_221_PREFIX: /opt/homebrew/opt/llvm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: optimal_control_webapp/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy, llvm-tools-preview
      - name: Install LLVM
        run: brew install llvm
      - name: Install webapp npm dependencies
        working-directory: optimal_control_webapp
        run: npm ci
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Check webapp TypeScript
        working-directory: optimal_control_webapp
        run: npm run check
      - name: Cargo check webapp
        run: cargo check -p optimal_control_webapp
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets
      - name: Run tests
        run: cargo test --workspace
      - name: Run sparse validation (PR tier)
        run: cargo run -p xtask -- sparse-validation --tier pr
      - name: Run sparse benchmark smoke
        run: cargo bench -p metis_ordering --bench ordering_validation -- --quick --noplot
      - name: Run sparse symbolic benchmark smoke
        run: cargo bench -p spral_ssids --bench symbolic_validation -- --quick --noplot
      - name: Coverage summary
        run: cargo llvm-cov --workspace --json --summary-only --output-path coverage-summary.json
      - name: Print coverage summary
        run: python3 scripts/coverage_summary.py coverage-summary.json
      - name: Coverage lcov
        run: cargo llvm-cov report --lcov --output-path coverage.lcov
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage-summary.json
            coverage.lcov
      - name: Upload sparse validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sparse-validation-pr
          path: target/reports/sparse_validation

  ipopt:
    runs-on: macos-14
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      LLVM_SYS_221_PREFIX: /opt/homebrew/opt/llvm
      PKG_CONFIG_PATH: /opt/homebrew/opt/ipopt/lib/pkgconfig
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy
      - name: Install LLVM and IPOPT
        run: brew install llvm ipopt
      - name: Run IPOPT optimization tests
        run: cargo test -p optimization --features ipopt
      - name: Run IPOPT clippy
        run: cargo clippy -p optimization --all-targets --features ipopt -- -D warnings
